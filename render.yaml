services:
  - type: web
    name: os-contrib-tracker-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5050
      - key: CLIENT_URL
        fromSecret: CLIENT_URL
      - key: MONGO_URI
        fromSecret: MONGO_URI
      - key: SESSION_SECRET
        fromSecret: SESSION_SECRET
      - key: JWT_SECRET
        fromSecret: JWT_SECRET
      - key: GITHUB_CLIENT_ID
        fromSecret: GITHUB_CLIENT_ID
      - key: GITHUB_CLIENT_SECRET
        fromSecret: GITHUB_CLIENT_SECRET
      - key: GITHUB_CALLBACK_URL
        fromSecret: GITHUB_CALLBACK_URL

  - type: web
    name: os-contrib-tracker-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: os-contrib-tracker-backend
          property: host